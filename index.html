<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Valentine App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login" class="auth-body">
  <div class="heart-layer" aria-hidden="true">
    <span class="heart heart-1"></span>
    <span class="heart heart-2"></span>
    <span class="heart heart-3"></span>
    <span class="heart heart-4"></span>
    <span class="heart heart-5"></span>
    <span class="heart heart-6"></span>
  </div>

  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-5 fade-page">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        <section class="romantic-card auth-card shadow-lg">
          <p class="eyebrow text-center mb-2">Welcome Back</p>
          <h1 class="display-title text-center">Login to Our Little Love Space</h1>
          <p class="subtitle text-center mb-4">Use the registered username and password to continue.</p>

          <div id="loginAlert" class="alert d-none" role="alert"></div>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label for="loginUsername" class="form-label">Username</label>
              <input type="text" class="form-control custom-input" id="loginUsername" placeholder="Your username" required>
            </div>
            <div class="mb-4">
              <label for="loginPassword" class="form-label">Password</label>
              <input type="password" class="form-control custom-input" id="loginPassword" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-romantic w-100">Login</button>
          </form>

          <div class="text-center mt-4">
            <a href="register.html" class="soft-link">Need to create a new account?</a>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
